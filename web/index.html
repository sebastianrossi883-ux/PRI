<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Inbox Bot Clienti</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="login-wrap" id="loginWrap">
  <form class="login" id="loginForm">
    <h2>Inbox Bot Clienti</h2>
    <input type="email" id="email" placeholder="Email" autocomplete="username" required />
    <input type="password" id="password" placeholder="Password" autocomplete="current-password" required />
    <div class="err" id="loginErr"></div>
    <button type="submit">Accedi</button>
  </form>
</div>

<div id="app" class="hidden">
  <header>
    <h1>Inbox Bot Clienti</h1>
    <span class="status" id="status"></span>
    <button class="ghost" id="btnLogout">Esci</button>
  </header>
  <div class="layout">
    <div class="list" id="list"><div class="empty">Caricamento...</div></div>
    <div class="chat">
      <div class="head" id="chatHead"><span class="empty muted">Seleziona una conversazione</span></div>
      <div class="messages" id="messages"></div>
      <div class="composer">
        <textarea id="reply" placeholder="Scrivi una risposta (esce dal numero della conversazione)"></textarea>
        <button id="btnSend">Invia</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
</body>
</html>
